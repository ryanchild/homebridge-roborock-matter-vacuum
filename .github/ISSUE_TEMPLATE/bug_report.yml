name: Bug report
description: Report a problem with Roborock Matter for Homebridge
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing this beta. Please do not paste your Homebridge config, Roborock password, verification code, tokens, serial numbers, or full device IDs.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "0.3.1"
    validations:
      required: true

  - type: input
    id: homebridge-version
    attributes:
      label: Homebridge version
      placeholder: "2.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.x"
    validations:
      required: true

  - type: input
    id: vacuum-model
    attributes:
      label: Roborock model
      placeholder: "Roborock S6 MaxV"
    validations:
      required: true

  - type: dropdown
    id: matter-controller
    attributes:
      label: Matter controller
      options:
        - Apple Home
        - Google Home
        - Alexa
        - SmartThings
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior you saw and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Homebridge
        2. Pair the Matter vacuum
        3. Change clean mode
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Sanitized Homebridge logs
      description: Remove account emails, passwords, verification codes, serial numbers, full device IDs, and anything else private.
      render: text
    validations:
      required: false
